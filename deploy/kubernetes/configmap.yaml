apiVersion: v1
kind: ConfigMap
metadata:
  name: svidmint-config
  labels:
    app: svidmint
data:
  config.yaml: |
    trust_domain: "example.org"
    listen_address: ":8443"
    log_level: "info"

    tls:
      cert_file: "/etc/svidmint/tls/tls.crt"
      key_file: "/etc/svidmint/tls/tls.key"

    ca:
      type: "memory"
      key_type: "ec-p256"
      default_ttl: "1h"
      max_ttl: "24h"

    store:
      type: "sqlite"
      dsn: "/tmp/svidmint.db"

    attestors:
      - type: "k8s-sat"
        enabled: true
