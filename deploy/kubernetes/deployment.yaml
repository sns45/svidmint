apiVersion: apps/v1
kind: Deployment
metadata:
  name: svidmint
  labels:
    app: svidmint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svidmint
  template:
    metadata:
      labels:
        app: svidmint
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: svidmint
          image: ghcr.io/sns45/svidmint:latest
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
          args:
            - server
            - start
            - --config
            - /etc/svidmint/config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /v1/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: config
              mountPath: /etc/svidmint
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: svidmint-config
        - name: tmp
          emptyDir: {}
