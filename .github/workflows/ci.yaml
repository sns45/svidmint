name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go mod download
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m
      - name: Test
        run: CGO_ENABLED=1 go test -race ./...
      - name: Build
        run: go build -o /dev/null ./cmd/svidmint

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go mod download
      - name: Integration Tests
        run: CGO_ENABLED=1 go test -tags integration -race -v ./internal/...

  dogfood:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build svidmint
        run: CGO_ENABLED=1 go build -o bin/svidmint ./cmd/svidmint

      - name: Initialize CA
        run: |
          mkdir -p /tmp/svidmint
          ./bin/svidmint ca init \
            --trust-domain ci.svidmint.dev \
            --root-key-path /tmp/svidmint/root.key \
            --root-cert-path /tmp/svidmint/root.crt

      - name: Write server config
        run: |
          cat > /tmp/svidmint/config.yaml <<'YAML'
          trust_domain: ci.svidmint.dev
          server:
            listen: ":8443"
          ca:
            type: self-signed
            key_type: ec-p256
            root_key_path: /tmp/svidmint/root.key
            root_cert_path: /tmp/svidmint/root.crt
            signing_ttl: 1h
            default_svid_ttl: 5m
            max_svid_ttl: 1h
          storage:
            type: sqlite
            dsn: /tmp/svidmint/dogfood.db
          attestors:
            github_oidc:
              enabled: true
              allowed_repositories:
                - "sns45/svidmint"
              issuer: "https://token.actions.githubusercontent.com"
          YAML

      - name: Create registration entry
        run: |
          ./bin/svidmint entry create \
            --db /tmp/svidmint/dogfood.db \
            --spiffe-id spiffe://ci.svidmint.dev/github-actions/ci \
            --attestor github_oidc \
            --selector "github.repository:sns45/svidmint" \
            --ttl 300

      - name: Start server
        run: |
          ./bin/svidmint server start --config /tmp/svidmint/config.yaml &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8443/v1/health > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8443/v1/health || (echo "Server failed to start" && exit 1)

      - name: Fetch GitHub OIDC token and attest JWT SVID
        run: |
          echo "Fetching GitHub OIDC token..."
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=svidmint-ci" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "Failed to fetch OIDC token"
            exit 1
          fi
          echo "Got OIDC token (${#OIDC_TOKEN} chars)"

          EVIDENCE_JSON=$(echo -n "{\"oidc_token\":\"$OIDC_TOKEN\"}" | base64 -w0)

          echo "Attesting for JWT SVID..."
          RESPONSE=$(curl -sf -X POST http://localhost:8443/v1/attest \
            -H "Content-Type: application/json" \
            -d "{
              \"evidence_type\": \"github_oidc\",
              \"evidence\": \"$EVIDENCE_JSON\",
              \"svid_type\": \"jwt\",
              \"audience\": [\"svidmint-ci\"]
            }")

          echo "Attest response: $RESPONSE"
          SPIFFE_ID=$(echo "$RESPONSE" | jq -r '.spiffe_id')
          JWT_TOKEN=$(echo "$RESPONSE" | jq -r '.svid.token // .token // empty')

          if [ -z "$SPIFFE_ID" ] || [ "$SPIFFE_ID" = "null" ]; then
            echo "FAILED: No spiffe_id in response"
            exit 1
          fi
          echo "SUCCESS: Got SPIFFE ID: $SPIFFE_ID"

          # Save JWT token for validation step
          echo "$JWT_TOKEN" > /tmp/svidmint/jwt_svid.txt

      - name: Fetch fresh OIDC token and attest X.509 SVID
        run: |
          echo "Fetching fresh GitHub OIDC token..."
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=svidmint-ci" | jq -r '.value')

          EVIDENCE_JSON=$(echo -n "{\"oidc_token\":\"$OIDC_TOKEN\"}" | base64 -w0)

          echo "Attesting for X.509 SVID..."
          RESPONSE=$(curl -sf -X POST http://localhost:8443/v1/attest \
            -H "Content-Type: application/json" \
            -d "{
              \"evidence_type\": \"github_oidc\",
              \"evidence\": \"$EVIDENCE_JSON\",
              \"svid_type\": \"x509\"
            }")

          echo "X.509 attest response: $(echo "$RESPONSE" | jq -r '.spiffe_id')"
          SPIFFE_ID=$(echo "$RESPONSE" | jq -r '.spiffe_id')

          if [ -z "$SPIFFE_ID" ] || [ "$SPIFFE_ID" = "null" ]; then
            echo "FAILED: No spiffe_id in X.509 response"
            exit 1
          fi
          echo "SUCCESS: Got X.509 SVID for: $SPIFFE_ID"

      - name: Validate JWT SVID
        run: |
          JWT_TOKEN=$(cat /tmp/svidmint/jwt_svid.txt)
          if [ -n "$JWT_TOKEN" ] && [ "$JWT_TOKEN" != "null" ]; then
            echo "Validating JWT SVID..."
            RESPONSE=$(curl -sf -X POST http://localhost:8443/v1/validate \
              -H "Content-Type: application/json" \
              -d "{\"svid_type\": \"jwt\", \"svid\": \"$JWT_TOKEN\"}")
            echo "Validate response: $RESPONSE"
            VALID=$(echo "$RESPONSE" | jq -r '.valid')
            echo "JWT SVID valid: $VALID"
          else
            echo "Skipping JWT validation (no token captured)"
          fi

      - name: Fetch trust bundle
        run: |
          echo "Fetching trust bundle..."
          BUNDLE=$(curl -sf http://localhost:8443/v1/bundle)
          DOMAIN=$(echo "$BUNDLE" | jq -r '.trust_domain')
          echo "Trust domain: $DOMAIN"
          if [ "$DOMAIN" != "ci.svidmint.dev" ]; then
            echo "FAILED: unexpected trust domain"
            exit 1
          fi
          echo "SUCCESS: Trust bundle for $DOMAIN"

      - name: Fetch JWKS
        run: |
          echo "Fetching JWKS..."
          JWKS=$(curl -sf http://localhost:8443/v1/jwks)
          KEYS=$(echo "$JWKS" | jq '.keys | length')
          echo "JWKS contains $KEYS key(s)"
          if [ "$KEYS" -lt 1 ]; then
            echo "FAILED: no keys in JWKS"
            exit 1
          fi
          echo "SUCCESS: JWKS endpoint working"
